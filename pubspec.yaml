name: peria_app
description: Peria App — Flutter application
version: 1.0.0+1

flutter_gen:
  output: lib/core/gen/
  line_length: 80

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: '>=0.19.0 <0.21.0'
  # State management
  flutter_riverpod: ^2.4.0
  # Navigation
  go_router: ^13.0.0
  # Local storage
  shared_preferences: ^2.2.0
  # HTTP
  dio: ^5.4.0
  # Icons
  flutter_svg: ^2.0.9
  # Shimmer loading
  shimmer: ^3.0.0
  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.6
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  equatable: ^2.0.8
  flutter_launcher_icons: ^0.14.4
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_gen: ^5.8.0
  flutter_gen_runner: ^5.8.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  mocktail: ^1.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/onboarding/
    - assets/images/logo/
    - assets/images/icons/
    - assets/images/
    - moc/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo/logo.png"
  adaptive_icon_background: "#FFFFFF"
  android_12: true
   image:assets/images/logo/logo.png
   icon_background_color:"#FFFFFF"


  # ── Custom Fonts ──────────────────────────────────────────────────────────
  # Place your font files in assets/fonts/
