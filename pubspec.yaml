name: perla_app
description: Perla App — Flutter application
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: '>=0.19.0 <0.21.0'
  # State management
  flutter_riverpod: ^2.4.0
  # Navigation
  go_router: ^13.0.0
  # Local storage
  shared_preferences: ^2.2.0
  # HTTP
  dio: ^5.4.0
  # Icons
  flutter_svg: ^2.0.9
  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.6
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_gen: 5.9.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  generate: true
  uses-material-design: true

  # ── Custom Fonts ──────────────────────────────────────────────────────────
  # Place your font files in assets/fonts/
  # fonts:
  #   - family: PerlApp
  #     fonts:
  #       - asset: assets/fonts/PerlApp-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/PerlApp-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/PerlApp-Bold.ttf
  #         weight: 700

  # ── Assets ────────────────────────────────────────────────────────────────
  assets:
    - assets/images/onboarding/
    - assets/images/logo/
    - assets/images/icons/
    - assets/images/
    - moc/
    # - assets/icons/
    # - assets/fonts/
