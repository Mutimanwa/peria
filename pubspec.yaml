  #   - family: PerlApp
  #     fonts:
  #       - asset: assets/fonts/PerlApp-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/PerlApp-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/PerlApp-Bold.ttf
  #         weight: 700
